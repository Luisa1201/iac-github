AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 creada desde GitHub Actions

Resources:

  MyEC2NewClass:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro

      Tags:
        - Key: Name
          Value: EC2-GitHubActions

Outputs:

  InstanceId:
    Value: !Ref MyEC2NewClass